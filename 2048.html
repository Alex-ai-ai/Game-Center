<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=20260703-3">
    <style>
        .game-2048-container {
            background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(248,250,255,0.88));
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 1.4rem;
            margin: 2rem auto 2rem auto;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(30,40,80,0.12);
            text-align: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.78);
            overflow: hidden;
        }
        .game-2048-container::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 5px;
            background: linear-gradient(90deg, #FF6B6B, #4ECDC4);
        }
        .board-2048 {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            margin: 0 auto 1.2rem auto;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08), 0 12px 28px rgba(80,60,40,0.12);
        }
        .cell-2048 {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            border-radius: 10px;
            background: #cdc1b4;
            color: #776e65;
            transition: all 0.2s;
            user-select: none;
        }
        .score-2048 {
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
        }
        .play-button {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 20px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: auto;
        }
        .play-button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .game-header {
            width: 100%;
            height: 66px;
            padding: 0 2rem;
            background: rgba(255,255,255,0.84);
            backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            gap: 2rem;
            box-sizing: border-box;
            box-shadow: 0 8px 28px rgba(30, 40, 80, 0.08);
            border-bottom: 1px solid rgba(255,255,255,0.72);
        }
        .game-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }
        .back-btn {
            background: none;
            border: none;
            color: #444;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 8px 15px;
            border-radius: 20px;
            transition: background-color 0.3s;
            text-decoration: none;
        }
        .back-btn:hover {
            background: #f0f0f5;
        }
        .game-over-2048 {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            color: #222;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            padding: 2.2rem 2.5rem 2rem 2.5rem;
            min-width: 260px;
            width: 350px;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            border: 1px solid #e8e8ee;
        }
        .game-over-modal-2048 {
            background: rgba(255,255,255,0.95);
            color: #222;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            padding: 2.5rem 3.5rem;
            text-align: center;
            min-width: 320px;
            max-width: 90vw;
        }
        .game-over-modal-2048 h2 {
            font-size: 2.2rem;
            margin-bottom: 1.2rem;
            color: #FF6B6B;
        }
        .game-over-modal-2048 .score-row {
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
        }
        .game-over-modal-2048 .score-value {
            color: #4ECDC4;
            font-weight: bold;
            font-size: 1.4rem;
            margin-left: 0.5em;
        }
        .game-over-modal-2048 .modal-buttons {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .game-over-modal-2048 .play-button {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
            border: none;
            padding: 0.7rem 2.2rem;
            border-radius: 20px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .game-over-modal-2048 .play-button:hover {
            background: linear-gradient(45deg, #4ECDC4, #FF6B6B);
        }
        #game-over-text-2048 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="game-header">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> 返回菜单
        </a>
        <h2 style="flex:1; text-align:center;">2048</h2>
    </div>
    <div class="game-2048-container">
        <div class="score-2048">分数：<span id="score-2048">0</span>　最高分：<span id="highscore-2048">0</span></div>
        <div class="board-2048" id="board-2048"></div>
        <div style="margin-top:1rem;color:#888;font-size:0.95rem;">使用方向键移动方块，合并相同数字，获得2048即可获胜！</div>
        <button id="restart-2048" class="play-button" style="margin-top:1.5rem;">重新开始</button>
        <div class="game-over-2048" id="game-over-2048">
            <div id="game-over-text-2048">游戏结束！</div>
            <div style="display:flex;gap:1.2rem;justify-content:center;">
                <button id="restart-btn-2048" class="play-button" style="margin-top:1rem;">重新开始</button>
                <button onclick="window.location.href='index.html'" class="play-button" style="margin-top:1rem;">返回主页</button>
            </div>
        </div>
    </div>
    <script src="2048.js"></script>
</body>
</html>
