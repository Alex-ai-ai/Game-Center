<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - 大网游戏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at 8% 12%, rgba(255, 107, 107, 0.20), transparent 30rem),
                radial-gradient(circle at 88% 8%, rgba(78, 205, 196, 0.22), transparent 32rem),
                radial-gradient(circle at 50% 100%, rgba(116, 92, 255, 0.12), transparent 34rem),
                linear-gradient(180deg, #fbfcff 0%, #eef3ff 46%, #f8f7fb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            color: #222;
        }

        .game-container {
            background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(248,250,255,0.88));
            backdrop-filter: blur(16px);
            padding: 18px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(30, 40, 80, 0.12);
            text-align: center;
            margin: 86px auto 1rem;
            max-width: 520px;
            border: 1px solid rgba(255,255,255,0.78);
            position: relative;
            overflow: hidden;
        }
        .game-container::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 5px;
            background: linear-gradient(90deg, #FF6B6B, #4ECDC4);
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 66px;
            padding: 0 2rem;
            margin: 0;
            box-sizing: border-box;
            background: rgba(255,255,255,0.84);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(255,255,255,0.72);
            box-shadow: 0 8px 28px rgba(30, 40, 80, 0.08);
            z-index: 20;
        }
        .game-header h1 {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .back-button {
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(255,255,255,0.8);
            padding: 8px 16px;
            border-radius: 999px;
            color: #444;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            font-weight: 800;
            box-shadow: 0 8px 22px rgba(30, 40, 80, 0.08);
        }

        .back-button:hover {
            background: #f0f0f5;
            border-color: #e8e8ee;
            transform: translateY(-2px);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            padding: 10px 20px;
            background: #f8f8fc;
            border-radius: 10px;
            border: 1px solid #e8e8ee;
        }

        .game-stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            color: #888;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #4ECDC4;
        }

        .game-controls {
            display: flex;
            gap: 10px;
        }

        .control-button {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .control-button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .control-button.undo {
            background: linear-gradient(45deg, #4ECDC4, #556270);
        }

        .board-container {
            position: relative;
            margin: 0 auto;
            width: 100%;
            max-width: 480px;
            height: auto;
        }

        #gameBoard {
            background: #DEB887;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            height: auto;
            max-width: 480px;
            display: block;
            margin: 0 auto;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08), 0 12px 28px rgba(120,80,40,0.16);
        }

        .player-turn {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            border: 1px solid #e8e8ee;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .winner-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 30px;
            border-radius: 18px;
            text-align: center;
            color: #222;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
            border: 1px solid #e8e8ee;
        }

        .winner-modal h2 {
            color: #4ECDC4;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 999;
        }

        /* 添加难度选择界面样式 */
        .difficulty-screen {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            margin-top: 86px;
        }

        .difficulty-container {
            background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(248,250,255,0.88));
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(30, 40, 80, 0.12);
            border: 1px solid rgba(255,255,255,0.78);
        }

        .difficulty-title {
            text-align: center;
            margin: 0;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        /* 模式选择样式 */
        .mode-selection {
            margin-bottom: 30px;
        }

        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .mode-button {
            background: #f8f8fc;
            border: 2px solid #e8e8ee;
            padding: 15px 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #222;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 150px;
            justify-content: center;
        }

        .mode-button:hover {
            background: #f0f0f5;
            transform: translateY(-3px);
        }

        .mode-button.selected {
            border-color: #4ECDC4;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }

        .mode-description {
            text-align: center;
            font-size: 1rem;
            color: #888;
            margin: 10px 0;
            min-height: 48px;
        }

        /* 难度选择样式 */
        .difficulty-options {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .difficulty-options.show {
            display: grid;
        }

        .difficulty-button {
            background: #f8f8fc;
            border: 2px solid #e8e8ee;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #222;
            text-align: center;
        }

        .difficulty-button:hover {
            background: #f0f0f5;
            transform: translateY(-3px);
        }

        .difficulty-button.selected {
            border-color: #4ECDC4;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }

        .difficulty-button i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #4ECDC4;
        }

        .difficulty-button div:nth-child(2) {
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .difficulty-description {
            font-size: 0.9rem;
            color: #888;
        }

        .start-game-button {
            background: linear-gradient(135deg, #4ECDC4, #2E9B94);
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
            min-width: 200px;
        }

        .start-game-button:disabled {
            background: linear-gradient(135deg, #2c7571, #1a5a56);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .start-game-button:not(:disabled):hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(78, 205, 196, 0.3);
        }
        .back-btn-2048 {
            background: none;
            border: none;
            color: #444;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 8px 15px;
            border-radius: 20px;
            transition: background-color 0.3s;
            margin-bottom: 1rem;
            text-decoration: none;
        }
        .back-btn-2048:hover {
            background: #f0f0f5;
        }
        .back-btn-unified {
            position: fixed;
            left: 30px;
            top: 30px;
            z-index: 200;
            background: none;
            border: none;
            color: #444;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 8px 15px;
            border-radius: 20px;
            transition: background-color 0.3s;
            text-decoration: none;
        }
        .back-btn-unified:hover {
            background: #f0f0f5;
        }
    </style>
</head>
<body>
    <div class="game-header" id="gomokuHeader">
        <a href="index.html" class="back-button" id="homeBackBtn">
            <i class="fas fa-arrow-left"></i> 返回
        </a>
        <button class="back-button" id="backToModeBtn" style="display: none;">
            <i class="fas fa-arrow-left"></i> 返回
        </button>
        <h1>五子棋</h1>
        <div style="width: 100px;"></div>
    </div>

    <!-- 游戏界面 -->
    <div class="game-container" id="gameContainer" style="display: none;">
        <div class="game-info">
            <div class="game-stats">
                <div class="stat-item">
                    <div class="stat-label">步数</div>
                    <div class="stat-value" id="moveCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">用时</div>
                    <div class="stat-value" id="gameTime">00:00</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">模式</div>
                    <div class="stat-value" id="modeDisplay">-</div>
                </div>
            </div>
            <div class="game-controls">
                <button class="control-button undo" id="undoBtn">
                    <i class="fas fa-undo"></i> 悔棋
                </button>
                <button class="control-button" id="restartBtn">
                    <i class="fas fa-redo"></i> 重新开始
                </button>
            </div>
        </div>

        <div class="board-container">
            <div class="player-turn" id="playerTurn">当前玩家: 黑子</div>
            <canvas id="gameBoard" width="600" height="600"></canvas>
        </div>
    </div>

    <!-- 难度选择界面 -->
    <div class="difficulty-screen" id="difficultyScreen">
        <div class="difficulty-container">
            <!-- 添加模式选择 -->
            <div class="mode-selection">
                <div class="mode-buttons">
                    <button class="mode-button" data-mode="ai">
                        <i class="fas fa-robot"></i> AI对战
                    </button>
                    <button class="mode-button" data-mode="pvp">
                        <i class="fas fa-users"></i> 双人对战
                    </button>
                </div>
                <div class="mode-description" id="modeDescription">
                    请选择游戏模式
                </div>
            </div>

            <!-- AI难度选择 -->
            <div class="difficulty-options" id="difficultyOptions">
                <button class="difficulty-button" data-difficulty="easy">
                    <i class="fas fa-child"></i>
                    <div>简单</div>
                    <div class="difficulty-description">适合初学者</div>
                </button>
                <button class="difficulty-button" data-difficulty="medium">
                    <i class="fas fa-user"></i>
                    <div>中等</div>
                    <div class="difficulty-description">有一定挑战</div>
                </button>
                <button class="difficulty-button" data-difficulty="hard">
                    <i class="fas fa-chess-king"></i>
                    <div>困难</div>
                    <div class="difficulty-description">极具挑战性</div>
                </button>
            </div>

            <button class="start-game-button" id="startGameBtn" disabled>开始游戏</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="winner-modal" id="winnerModal">
        <h2 id="winnerText">黑子获胜！</h2>
        <div class="game-stats">
            <div class="stat-item">
                <div class="stat-label">总步数</div>
                <div class="stat-value" id="finalMoveCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">总用时</div>
                <div class="stat-value" id="finalGameTime">00:00</div>
            </div>
        </div>
        <div class="modal-buttons">
            <button class="control-button" id="playAgainBtn">返回模式选择</button>
        </div>
    </div>

    <script src="gomoku.js?v=20260703-4"></script>
</body>
</html>
