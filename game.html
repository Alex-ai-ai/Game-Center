<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at 8% 12%, rgba(255, 107, 107, 0.20), transparent 30rem),
                radial-gradient(circle at 88% 8%, rgba(78, 205, 196, 0.22), transparent 32rem),
                radial-gradient(circle at 50% 100%, rgba(116, 92, 255, 0.12), transparent 34rem),
                linear-gradient(180deg, #fbfcff 0%, #eef3ff 46%, #f8f7fb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #222;
        }

        .game-header {
            width: 100%;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.84);
            backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            gap: 2rem;
            box-sizing: border-box;
            box-shadow: 0 8px 28px rgba(30, 40, 80, 0.08);
            border-bottom: 1px solid rgba(255,255,255,0.72);
        }

        .back-btn {
            background: none;
            border: none;
            color: #444;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 8px 15px;
            border-radius: 20px;
            transition: background-color 0.3s;
        }

        .back-btn:hover {
            background: #f0f0f5;
        }

        #main-container {
            margin-top: 2rem;
            position: relative;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .side-panel {
            width: 160px;
            background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(248,250,255,0.88));
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: 1px solid rgba(255,255,255,0.78);
            box-shadow: 0 20px 52px rgba(30, 40, 80, 0.12);
            position: relative;
            overflow: hidden;
        }

        .side-panel::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 4px;
            background: linear-gradient(90deg, #FF6B6B, #4ECDC4);
        }

        .next-piece {
            text-align: center;
        }

        #next-piece {
            background: #f0f0f5;
            border-radius: 5px;
            margin-top: 0.5rem;
        }

        .game-stats {
            background: #f8f8fc;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid #e8e8ee;
        }

        .game-stats div {
            margin: 0.5rem 0;
            display: flex;
            justify-content: space-between;
        }

        #tetris {
            background: #f0f0f5;
            border-radius: 18px;
            box-shadow: 0 16px 36px rgba(20, 20, 40, 0.08);
            border: 1px solid #e8e8ee;
        }

        #pause-btn {
            background: #f8f8fc;
            border: 1px solid #e8e8ee;
            color: #444;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            font-size: 1.2rem;
        }

        #pause-btn:hover {
            background: #f0f0f5;
        }

        #pause-btn.paused {
            background: #f0f0f5;
        }

        #pause-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        #pause-menu.active {
            display: flex;
        }

        #pause-menu h2 {
            color: #222;
            margin-bottom: 2rem;
        }

        #pause-menu button {
            background: #fff;
            border: 1px solid #e8e8ee;
            color: #222;
            padding: 12px 24px;
            border-radius: 20px;
            margin: 0.5rem;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 1rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
        }

        #pause-menu button:hover {
            background: #f0f0f5;
        }

        #end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #222;
        }

        #end-screen.active {
            display: flex;
        }

        .star {
            color: gold;
            font-size: 2rem;
            margin: 0.5rem;
        }

        #restart-btn, #menu-btn {
            background: #fff;
            border: 1px solid #e8e8ee;
            color: #222;
            padding: 10px 20px;
            border-radius: 20px;
            margin: 0.5rem;
            cursor: pointer;
            transition: background-color 0.3s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
        }

        #restart-btn:hover, #menu-btn:hover {
            background: #f0f0f5;
        }
    </style>
</head>
<body>
    <div class="game-header">
        <a href="tetris.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> 返回菜单
        </a>
        <h2>俄罗斯方块</h2>
    </div>
    
    <div id="main-container">
        <div class="side-panel">
            <div class="next-piece">
                <div>下一个方块</div>
                <canvas id="next-piece" width="120" height="120"></canvas>
            </div>
            <div class="game-stats">
                <div>
                    <span>分数:</span>
                    <span id="score">0</span>
                </div>
                <div>
                    <span>等级:</span>
                    <span id="level">1</span>
                </div>
                <div>
                    <span>行数:</span>
                    <span id="lines">0</span>
                </div>
            </div>
            <button id="pause-btn">
                <i class="fas fa-pause" id="pause-icon"></i>
            </button>
        </div>

        <canvas id="tetris" width="300" height="600"></canvas>
    </div>

    <div id="pause-menu">
        <h2>游戏暂停</h2>
        <button id="resume-btn">继续游戏</button>
        <button id="restart-btn-pause">重新开始</button>
        <button id="quit-btn">退出游戏</button>
    </div>

    <div id="end-screen">
        <h2 id="end-title">游戏结束</h2>
        <p>最终得分：<span id="end-score">0</span></p>
        <div id="star-container"></div>
        <div>
            <button id="restart-btn">重新开始</button>
            <button id="menu-btn">返回菜单</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
